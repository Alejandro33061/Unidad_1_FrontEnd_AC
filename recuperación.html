<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Recuperar contraseña</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="contenedor">

    <div class="espacio-logo">
        <img src="imagenes/logo.png" alt="Logo" width="280">
    </div>

    <h1>Recuperar contraseña</h1>

    <div class="grupo">
        <label>Email:</label>
        <input type="email" placeholder="Ingresa tu correo" required>
    </div>

    <input type="checkbox" id="enviado">

    <label for="enviado" class="boton-ingresar">
        Enviar instrucciones
    </label>

    <p class="mensaje">
        Se ha enviado un correo de recuperación.
    </p>

    <hr>

    <div class="pie-pagina">
        <a href="index.html">Volver al login</a>
    </div>

</div>

</body>
</html>
