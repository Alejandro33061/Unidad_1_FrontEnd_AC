<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SportClub - Usuario</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="contenedor contenedor-ancho borde-azul">
        <div class="header-dash">
            <img src="imagenes/logo.png" alt="Logo" width="120">
            <h2>DASHBOARD USUARIO</h2>
            <div>
                <button class="boton-ingresar btn-mini">Editar Perfil</button>
                <a href="index.html" class="boton-ingresar btn-mini">Cerrar Sesión</a>
            </div>
        </div>
        <div style="font-weight: bold; margin-bottom: 15px;">Inicio | Clases | Reservas | Mi Progreso</div>
        <hr style="margin-bottom: 20px; border: 0; border-top: 1px solid #eee;">
        
        <h3>Bienvenido a SportClub</h3>
        <div class="fila">
            <div class="columna">
                <h4>Mi Perfil</h4>
                <p><strong>Nombre:</strong> Juan Pérez</p>
                <p><strong>Email:</strong> usuario123@mail.com</p>
            </div>
            <div class="columna" style="text-align: center;">
                <h4>Progreso</h4>
                <div class="progreso-circulo">75%</div>
                <p>Avance del mes</p>
            </div>
            <div class="columna">
                <h4>Clases Disponibles</h4>
                <div class="item-alineado">
                    <span>Spinning</span>
                    <button class="boton-ingresar btn-mini">Reservar</button>
                </div>
                <div class="item-alineado">
                    <span>CrossFit</span>
                    <button class="boton-ingresar btn-mini">Reservar</button>
                </div>
            </div>
        </div>
    </div>
    
</body>
</html>
