<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de usuario</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contenedor">

        <div class="espacio-logo">
            <img src="imagenes/logo.png" alt="Logo" width="280">
        </div>

        <h1>Registro</h1>

        <form>
            <div class="grupo">
                <label>Nombre y apellido:</label>
                <input type="text" placeholder="Ingresa tu nombre">
            </div>

            <div class="grupo">
                <label>Email/Correo:</label>
                <input type="email" placeholder="Ingresa tu correo">
            </div>

            <div class="grupo">
                <label>Contraseña:</label>
                <input type="password" placeholder="Crea una contraseña">
            </div>
            <div class="grupo">
                <label>Confirmar contraseña:</label>
                <input type="password" placeholder="Confirma la contraseña">
            </div>
            <div class="grupo">
                <label>Fecha de cumpleaños:</label>
                <input type="number" placeholder="Ingresa tu fecha de cumpleaños">
            </div>
            <div class="grupo">
                <label>Numero de telefono:</label>
                <input type="number" placeholder="Ingresa tu telefono">
            </div>
            <button type="submit" class="boton-ingresar">
                Registrarse
            </button>
        </form>

        <hr>

        <div class="pie-pagina">
            <a href="index.html">Volver al login</a>
        </div>

    </div>

</body>
</html>
